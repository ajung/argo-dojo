apiVersion: apps/v1
kind: Deployment
metadata:
  name: hooks-demo-app
  namespace: default
  labels:
    app: hooks-demo
    demo: hooks
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hooks-demo
  template:
    metadata:
      labels:
        app: hooks-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi

