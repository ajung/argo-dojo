apiVersion: batch/v1
kind: Job
metadata:
  name: presync-backup
  namespace: default
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
  labels:
    demo: hooks
spec:
  template:
    metadata:
      name: presync-backup
    spec:
      restartPolicy: Never
      containers:
        - name: backup
          image: alpine:3.19
          command:
            - sh
            - -c
            - |
              echo "=== PreSync Hook: Simulating Backup ==="
              echo "Timestamp: $(date)"
              echo "Creating backup snapshot..."
              sleep 3
              echo "Backup completed successfully!"
              echo "Ready for deployment..."

