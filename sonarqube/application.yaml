apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sonarqube
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default

  source:
    repoURL: https://SonarSource.github.io/helm-chart-sonarqube
    chart: sonarqube
    targetRevision: 10.6.0+3033
    helm:
      releaseName: sonarqube
      # `values.yaml` here is not fetched from the external Helm chart itself.
      # For an external chart repo like `https://SonarSource.github.io/helm-chart-sonarqube`,
      # Argo CD must read this file from the Git repository in a multi-source setup.
      # This relative path is therefore intended to refer to the Git-tracked values file,
      # not a file bundled inside the upstream chart.
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: sonarqube

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

